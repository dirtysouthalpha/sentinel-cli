name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test (vitest)
        run: npm test

      - name: Build engine (tsup)
        run: npm run build

      - name: Build GUI (vite)
        working-directory: gui
        run: |
          npm install
          npm run build
